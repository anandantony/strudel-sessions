name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.11.1"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Debug environment
        run: |
          echo "=== node/npm versions ==="
          node -v
          npm -v
          echo "=== repo root files ==="
          ls -la
          echo "=== lockfiles ==="
          test -f package-lock.json && ls -la package-lock.json || echo "no package-lock.json"
          test -f pnpm-lock.yaml && echo "pnpm-lock.yaml present" || true
          test -f yarn.lock && echo "yarn.lock present" || true

      - name: Install dependencies
        run: |
          npm ci || (echo "=== npm debug logs ===" && tail -n +1 /home/runner/.npm/_logs/*.log || true) && exit 0
        shell: bash

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
