<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Strudel Sessions OG Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Monoton&family=Special+Elite&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      width: 1024px;
      height: 1024px;
      background:
        radial-gradient(circle at 16% 18%, rgba(232, 89, 45, 0.28), transparent 40rem),
        radial-gradient(circle at 82% 12%, rgba(42, 157, 143, 0.2), transparent 40rem),
        linear-gradient(145deg, #19140f 0%, #2a2018 48%, #101419 100%);
      color: #f7efe3;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 80px;
      overflow: hidden;
      position: relative;
    }
    
    /* Subtle scanlines / grid overlay */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(90deg, transparent 0 30px, rgba(255, 246, 231, 0.03) 31px 32px),
        linear-gradient(transparent 0 49%, rgba(137, 210, 200, 0.15) 50% 51%, transparent 52%);
      pointer-events: none;
    }

    .header {
      text-align: center;
      z-index: 2;
    }
    
    .eyebrow {
      color: #89d2c8;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 20px;
      text-shadow: 0 0 10px rgba(137, 210, 200, 0.4);
    }
    
    h1 {
      font-family: 'Monoton', cursive;
      font-size: 5.5rem;
      margin: 0;
      line-height: 1;
      text-transform: uppercase;
      background: linear-gradient(to right, #fff6e7, #f2b544, #e8592d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 30px rgba(232, 89, 45, 0.4));
    }

    .subtitle {
      font-family: 'Special Elite', Georgia, serif;
      font-size: 2.2rem;
      color: rgba(247, 239, 227, 0.85);
      margin-top: 15px;
      letter-spacing: 2px;
    }

    /* Giant Vinyl Record Mockup */
    .vinyl-container {
      position: relative;
      width: 480px;
      height: 480px;
      margin: 20px 0;
      padding: 12px;
      z-index: 1;
      background: repeating-radial-gradient(circle, transparent 0 10px, rgba(255, 255, 255, 0.08) 11px 12px);
      border: 20px solid #c0c0c0;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }

    .vinyl {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background:
        radial-gradient(circle, #0d0d0d 0 14%, #262626 14.5% 64%, #0f0f0f 65% 100%);
      box-shadow:
        0 25px 60px rgba(0, 0, 0, 0.6),
        inset 0 0 0 15px rgba(255, 246, 231, 0.08);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .vinyl-label {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      background:
        radial-gradient(circle, #fff2bf 0 19%, transparent 20%),
        linear-gradient(135deg, #f3d4a0, #e8592d);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 6px solid #201711;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      color: #201711;
      padding: 20px;
      text-align: center;
    }

    .label-title {
      font-size: 1.1rem;
      font-weight: 900;
      margin: 0 0 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .label-sub {
      font-size: 0.65rem;
      font-weight: 700;
      opacity: 0.8;
      text-transform: uppercase;
    }

    .grooves {
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .grooves::before {
      content: '';
      position: absolute;
      inset: 40px;
      border-radius: 50%;
      border: 2px dashed rgba(255, 255, 255, 0.04);
    }
    .grooves::after {
      content: '';
      position: absolute;
      inset: 80px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      width: 100%;
      z-index: 2;
      border-top: 1px solid rgba(247, 239, 227, 0.2);
      padding-top: 30px;
    }

    .footer-item {
      font-size: 1.1rem;
      font-weight: 800;
      color: rgba(247, 239, 227, 0.6);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    .footer-item.highlight {
      color: #89d2c8;
    }

    /* Decorative visualizer bars on left and right */
    .visualizer-side {
      position: absolute;
      bottom: 200px;
      height: 300px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      opacity: 0.15;
    }
    .visualizer-left {
      left: 50px;
    }
    .visualizer-right {
      right: 50px;
      transform: scaleX(-1);
    }
    .bar {
      width: 10px;
      background: linear-gradient(to top, rgba(242, 181, 68, 0.1), #e8592d);
      border-radius: 5px 5px 0 0;
    }
  </style>
</head>
<body>

  <div class="visualizer-side visualizer-left">
    <div class="bar" style="height: 120px;"></div>
    <div class="bar" style="height: 180px;"></div>
    <div class="bar" style="height: 240px;"></div>
    <div class="bar" style="height: 150px;"></div>
    <div class="bar" style="height: 90px;"></div>
  </div>

  <div class="visualizer-side visualizer-right">
    <div class="bar" style="height: 120px;"></div>
    <div class="bar" style="height: 180px;"></div>
    <div class="bar" style="height: 240px;"></div>
    <div class="bar" style="height: 150px;"></div>
    <div class="bar" style="height: 90px;"></div>
  </div>

  <div class="header">
    <div class="eyebrow">Interactive Live Music</div>
    <h1>Strudel Sessions</h1>
    <div class="subtitle">Airwave Tape Archive</div>
  </div>

  <div class="vinyl-container">
    <div class="vinyl">
      <div class="grooves"></div>
      <div class="vinyl-label">
        <div class="label-title">Strudel</div>
        <div class="label-sub">Tape Vol. 1</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-item">house</div>|
    <div class="footer-item highlight">dance</div>|
    <div class="footer-item">chill-out</div>|
    <div class="footer-item highlight">electronic</div>|
    <div class="footer-item">ambient</div>|
    <div class="footer-item highlight">experimental</div>|
    <div class="footer-item">groove</div>
  </div>

</body>
</html>
