<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Strudel Sessions OG Template</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Monoton&family=Special+Elite&family=Inter:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        width: 1200px;
        height: 630px;
        background:
          radial-gradient(
            circle at 16% 18%,
            rgba(232, 89, 45, 0.28),
            transparent 45rem
          ),
          radial-gradient(
            circle at 82% 12%,
            rgba(42, 157, 143, 0.2),
            transparent 45rem
          ),
          linear-gradient(145deg, #19140f 0%, #2a2018 48%, #101419 100%);
        color: #f7efe3;
        font-family: "Inter", sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 50px 80px;
        overflow: hidden;
        position: relative;
      }

      /* Subtle scanlines / grid overlay */
      body::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          repeating-linear-gradient(
            90deg,
            transparent 0 30px,
            rgba(255, 246, 231, 0.03) 31px 32px
          ),
          linear-gradient(
            transparent 0 49%,
            rgba(137, 210, 200, 0.12) 50% 51%,
            transparent 52%
          );
        pointer-events: none;
      }

      .main-content {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        flex: 1;
        z-index: 2;
      }

      .header-area {
        max-width: 580px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: left;
      }

      .eyebrow {
        color: #89d2c8;
        font-size: 1.4rem;
        font-weight: 900;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        margin-bottom: 15px;
        text-shadow: 0 0 10px rgba(137, 210, 200, 0.4);
      }

      h1 {
        font-family: "Monoton", cursive;
        font-size: 5.6rem;
        margin: 0;
        line-height: 1;
        text-transform: uppercase;
        background: linear-gradient(to right, #fff6e7, #f2b544, #e8592d);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 25px rgba(232, 89, 45, 0.35));
      }

      .subtitle {
        font-family: "Special Elite", Georgia, serif;
        font-size: 2.1rem;
        color: rgba(247, 239, 227, 0.85);
        margin-top: 20px;
        letter-spacing: 1px;
      }

      /* Giant Vinyl Record Mockup with User Casing styling */
      .vinyl-container {
        position: relative;
        width: 350px;
        height: 350px;
        padding: 10px;
        background: linear-gradient(
          135deg,
          #a2790d 0%,
          #f2e29d 48%,
          #ffffff 50%,
          #f2e29d 52%,
          #a2790d 100%
        );
        border-radius: 20px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .vinyl-container::before {
        content: "";
        position: absolute;
        inset: -15px;
        background: linear-gradient(45deg, #434343 0%, #000000 100%);
        border-radius: 35px;
        z-index: -1;
      }

      .vinyl {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          #0d0d0d 0 14%,
          #262626 14.5% 64%,
          #0f0f0f 65% 100%
        );
        box-shadow:
          0 15px 35px rgba(0, 0, 0, 0.6),
          inset 0 0 0 10px rgba(255, 246, 231, 0.08);
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .vinyl-label {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background:
          radial-gradient(circle, #fff2bf 0 19%, transparent 20%),
          linear-gradient(135deg, #f3d4a0, #e8592d);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border: 4px solid #201711;
        box-shadow: 0 0 8px rgba(0, 0, 0, 0.5);
        color: #201711;
        padding: 12px;
        text-align: center;
        z-index: 1;
      }

      .label-title {
        font-size: 0.8rem;
        font-weight: 900;
        margin: 0 0 2px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .label-sub {
        font-size: 0.5rem;
        font-weight: 700;
        opacity: 0.8;
        text-transform: uppercase;
      }

      .grooves {
        position: absolute;
        inset: 12px;
        border-radius: 50%;
        background: repeating-radial-gradient(
          circle,
          transparent 0 10px,
          rgba(255, 255, 255, 0.08) 11px 12px
        );
      }

      .tonearm {
        position: absolute;
        inset: 2% 2% auto auto;
        width: 46%;
        aspect-ratio: 1;
        z-index: 4;
        pointer-events: none;
      }

      .tonearm::before {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        width: 32%;
        aspect-ratio: 1;
        border-radius: 50%;
        background: #221914;
        box-shadow: inset 0 0 0 8px rgba(255, 246, 231, 0.12);
      }

      .tonearm::after {
        content: "";
        position: absolute;
        top: calc(16% - 7px);
        right: calc(16% - 7px);
        width: 14px;
        aspect-ratio: 1;
        border-radius: 50%;
        z-index: 2;
        background: #fff6e7;
        box-shadow:
          0 0 0 4px rgba(33, 23, 18, 0.85),
          0 0 0 8px rgba(241, 192, 113, 0.22);
      }

      .tonearm span {
        position: absolute;
        top: calc(16% - -2px);
        right: 0;
        width: 118%;
        height: 8px;
        border-radius: 999px;
        background: #d4d4d4;
        transform: rotate(-85deg);
        transform-origin: calc(100% - 26px) center;
      }

      .turntable[data-loaded="true"] .tonearm span {
        transform: rotate(-10deg);
      }

      .tonearm span::after {
        content: "";
        position: absolute;
        left: -12px;
        top: -6px;
        width: 25px;
        height: 20px;
        border-radius: 4px;
        background: #15100d;
      }

      .footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        z-index: 2;
        border-top: 1px solid rgba(247, 239, 227, 0.2);
        padding-top: 25px;
        color: rgba(247, 239, 227, 0.4);
      }

      .footer-item {
        font-size: 1rem;
        font-weight: 800;
        color: rgba(247, 239, 227, 0.6);
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      .footer-item.highlight {
        color: #89d2c8;
      }

      /* Decorative visualizer bars on left side behind text */
      .visualizer-side {
        position: absolute;
        bottom: 60px;
        height: 200px;
        display: flex;
        align-items: flex-end;
        gap: 6px;
        opacity: 0.12;
        left: 80px;
        z-index: 1;
      }
      .bar {
        width: 8px;
        background: linear-gradient(to top, rgba(242, 181, 68, 0.1), #e8592d);
        border-radius: 4px 4px 0 0;
      }
    </style>
  </head>
  <body>
    <div class="visualizer-side">
      <div class="bar" style="height: 80px"></div>
      <div class="bar" style="height: 140px"></div>
      <div class="bar" style="height: 190px"></div>
      <div class="bar" style="height: 110px"></div>
      <div class="bar" style="height: 70px"></div>
      <div class="bar" style="height: 120px"></div>
      <div class="bar" style="height: 160px"></div>
    </div>

    <div class="main-content">
      <div class="header-area">
        <div class="eyebrow">Interactive Live Music</div>
        <h1>Strudel Sessions</h1>
        <div class="subtitle">Airwave Tape Archive</div>
      </div>

      <div class="vinyl-container">
        <div class="vinyl">
          <div class="grooves"></div>
          <div class="vinyl-label">
            <div class="label-title">Strudel</div>
            <div class="label-sub">Tape Vol. 1</div>
          </div>
        </div>
        <div class="tonearm" aria-hidden="true">
          <span></span>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-item">house</div>
      |
      <div class="footer-item highlight">dance</div>
      |
      <div class="footer-item">chill-out</div>
      |
      <div class="footer-item highlight">electronic</div>
      |
      <div class="footer-item">ambient</div>
      |
      <div class="footer-item highlight">experimental</div>
      |
      <div class="footer-item">groove</div>
    </div>
  </body>
</html>
